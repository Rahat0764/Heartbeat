<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💗 I Coded This Heartbeat For You</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020005;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(2, 0, 5, 0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .glow-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%) scale(1);
            background: radial-gradient(circle, rgba(255, 30, 90, 0.12) 0%, rgba(196, 71, 245, 0.03) 50%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(40px);
        }

        .msg {
            position: fixed;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            width: 100%;
        }

        .m1 {
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .m2 {
            font-family: 'Dancing Script', cursive;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
            text-shadow: 0 0 15px rgba(255, 45, 85, 0.4);
        }

        .m2 span {
            background: linear-gradient(135deg, #ff2d55, #ff6b9d, #c471f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 42px;
        }

        .msg.active .m1,
        .msg.active .m2 {
            opacity: 1;
            transform: translateY(0);
        }

        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 0, 5, 0.96);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .start-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .start-overlay.fade-out .glass-card {
            transform: scale(0.85);
        }

        .glass-card {
            position: relative;
            width: min(85vw, 340px);
            background: rgba(22, 8, 14, 0.55);
            border: 1px solid rgba(255, 45, 85, 0.18);
            border-radius: 24px;
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(255, 30, 80, 0.08);
            transform: scale(1);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .card-glow {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 30, 80, 0.15) 0%, transparent 70%);
            top: -40px;
            left: -40px;
            filter: blur(15px);
            pointer-events: none;
        }

        .card-icon {
            font-size: 54px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 12px rgba(255, 30, 80, 0.4));
            animation: pulseIcon 2.5s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .card-title {
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 22px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .loading-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #ff2d55, #9b72cf);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .status-text {
            font-size: 12px;
            color: #b5a2b0;
            font-family: 'Fira Code', monospace;
            margin-bottom: 26px;
        }

        .start-btn {
            position: relative;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff2d55 0%, #d90429 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
            box-shadow: 0 5px 20px rgba(255, 45, 85, 0.3);
        }

        .start-btn:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            box-shadow: none;
            transform: none !important;
        }

        .start-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow:
                0 8px 25px rgba(255, 45, 85, 0.5),
                0 0 15px rgba(155, 114, 207, 0.3);
        }

        .start-btn:active {
            transform: translateY(1px);
        }

        .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.6s;
        }

        .start-btn:not(:disabled) .btn-shine {
            animation: shineSweep 2.5s ease-in-out infinite;
        }

        @keyframes shineSweep {
            0%   { left: -100%; }
            50%  { left: 100%; }
            100% { left: 100%; }
        }

        .letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 0, 5, 0.7);
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .letter-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .letter-card {
            position: relative;
            width: min(90vw, 360px);
            background: rgba(20, 10, 25, 0.85);
            border: 1px solid rgba(255, 45, 85, 0.25);
            border-radius: 20px;
            padding: 35px 28px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 45, 85, 0.1);
            transform: translateY(20px) scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
        }

        .letter-overlay.active .letter-card {
            transform: translateY(0) scale(1);
        }

        .letter-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            transition: color 0.2s;
        }

        .letter-close:hover {
            color: #ff2d55;
        }

        .letter-header {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff2d55;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 45, 85, 0.15);
            padding-bottom: 8px;
        }

        .letter-body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.85);
            min-height: 100px;
            margin-bottom: 24px;
            white-space: pre-line;
        }

        .letter-sign {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 480px) {
            .m2 { font-size: 28px; }
            .m2 span { font-size: 32px; }
            .letter-body { font-size: 13px; }
            .glass-card { padding: 25px 20px; }
            .letter-card { padding: 25px 20px 25px; }
        }
    </style>
</head>
<body>
    
    <!-- Background Audio File: Replace 'your-audio-file.mp3' with your song file name -->
    <audio id="bgMusic" src="your-audio-file.mp3" loop></audio>

    <div class="start-overlay" id="startOverlay">
        <div class="glass-card">
            <div class="card-glow"></div>
            <div class="card-icon">💓</div>
            <h2 class="card-title">heartbeat.js</h2>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <p class="status-text" id="statusText">Ready to compile...</p>
            <button class="start-btn" id="startBtn" disabled>
                <span class="btn-text">Run heartbeat.js</span>
                <span class="btn-shine"></span>
            </button>
        </div>
    </div>

    <canvas id="c"></canvas>

    <div class="letter-overlay" id="letterOverlay">
        <div class="letter-card">
            <button class="letter-close" id="letterClose">&times;</button>
            <div class="letter-header">for you</div>
            <div class="letter-body" id="letterBody"></div>
            <!-- Sender Name Changed to Rahat -->
            <div class="letter-sign">— coded with love by Rahat</div>
        </div>
    </div>

    <div class="msg" id="msg">
        <p class="m1">I coded this heartbeat</p>
        <p class="m2">for <span>Kitty</span> 💗</p>
    </div>

    <script>
        (() => {
            'use strict';

            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');

            let W = window.innerWidth;
            let H = window.innerHeight;
            let CX = W / 2;
            let CY = H / 2;
            let dpr = Math.min(window.devicePixelRatio || 1, 2);

            let scale = Math.min(W, H) * 0.22;

            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                CX = W / 2;
                CY = H / 2;
                scale = Math.min(W, H) * 0.22;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.scale(dpr, dpr);
            }
            window.addEventListener('resize', resize);
            resize();

            const NUM_POINTS = 180;
            const ROTATION_SPEED_Y = 0.012;

            const WORDS = [
                'Kitty', 'kitty', '❤', 'love', 'te amo', 'je t\'aime',
                'forever', 'always', 'you', 'me & you', 'love you', 'sweetheart'
            ];

            let startTimestamp = null;
            let isIntroFinished = false;

            function playClickSound() {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    const audioCtx = new AudioCtx();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } catch (e) { }
            }

            function startCardLoader() {
                const loadingBar = document.getElementById('loadingBar');
                const statusText = document.getElementById('statusText');
                const startBtn = document.getElementById('startBtn');

                const duration = 2400;
                const steps = [
                    { threshold: 20, text: 'Loading heartbeat.js...' },
                    { threshold: 50, text: 'Compiling 3D coordinates...' },
                    { threshold: 80, text: 'Generating love particles...' },
                    { threshold: 95, text: 'Syncing heartbeat rhythm...' },
                    { threshold: 100, text: 'Ready.' }
                ];

                let loaderStart = null;

                function animateLoader(timestamp) {
                    if (!loaderStart) loaderStart = timestamp;
                    const progress = Math.min((timestamp - loaderStart) / duration, 1);
                    const percent = Math.floor(progress * 100);

                    loadingBar.style.width = `${percent}%`;
                    const activeStep = steps.find(s => percent <= s.threshold) || steps[steps.length - 1];
                    statusText.textContent = activeStep.text;

                    if (progress < 1) {
                        requestAnimationFrame(animateLoader);
                    } else {
                        startBtn.removeAttribute('disabled');
                    }
                }

                requestAnimationFrame(animateLoader);
            }

            setTimeout(startCardLoader, 400);

            // Button Click Event - Starts Audio and Animation
            document.getElementById('startBtn').addEventListener('click', () => {
                playClickSound();
                
                // Play Background Music
                const bgMusic = document.getElementById('bgMusic');
                bgMusic.play().catch(error => {
                    console.log("Audio play prevented by browser:", error);
                });

                document.getElementById('startOverlay').classList.add('fade-out');
                setTimeout(() => {
                    startTimestamp = performance.now();
                    isIntroFinished = true;
                }, 800);
            });

            let isLetterOpen = false;
            let isLetterTyping = false;
            // Changed recipient name to Kitty
            const letterText = "Dear Kitty,\n\nI coded this heartbeat for you...\n\nEvery line of code, every pixel, and every beat is a reminder of how much you mean to me.\n\nNo matter where life takes us, my heart will always run in an infinite loop for you, beating forever 💗.";

            function openLetter() {
                if (isLetterOpen) return;
                isLetterOpen = true;
                playClickSound();
                const overlay = document.getElementById('letterOverlay');
                overlay.classList.add('active');

                const body = document.getElementById('letterBody');
                body.innerHTML = '';

                if (isLetterTyping) return;
                isLetterTyping = true;

                let charIdx = 0;
                function typeChar() {
                    if (!isLetterOpen) {
                        isLetterTyping = false;
                        return;
                    }
                    if (charIdx < letterText.length) {
                        const char = letterText[charIdx];
                        if (char === '\n') {
                            body.innerHTML += '<br>';
                        } else {
                            body.innerHTML += char;
                        }
                        charIdx++;
                        setTimeout(typeChar, 35);
                    } else {
                        isLetterTyping = false;
                    }
                }
                setTimeout(typeChar, 400);
            }

            function closeLetter() {
                isLetterOpen = false;
                playClickSound();
                document.getElementById('letterOverlay').classList.remove('active');
            }

            document.getElementById('letterClose').addEventListener('click', (e) => {
                e.stopPropagation();
                closeLetter();
            });

            document.getElementById('letterOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('letterOverlay')) {
                    closeLetter();
                }
            });

            function getHeartPoint(t, layer) {
                const x = Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 16;

                const r = Math.sqrt(1 - layer * layer);
                const depthScale = 0.45 + 0.55 * r;

                return {
                    x: x * depthScale * 1.5,
                    y: (y * depthScale - 0.08) * 1.5,
                    z: layer * 0.7
                };
            }

            function project3D(point, rotY, rotX) {
                const cosY = Math.cos(rotY);
                const sinY = Math.sin(rotY);
                const x1 = point.x * cosY - point.z * sinY;
                const z1 = point.x * sinY + point.z * cosY;

                const cosX = Math.cos(rotX);
                const sinX = Math.sin(rotX);
                const y2 = point.y * cosX - z1 * sinX;
                const z2 = point.y * sinX + z1 * cosX;

                const dist = 3.5;
                const perspective = dist / (dist + z2);

                point.projX = CX + x1 * scale * perspective;
                point.projY = CY + y2 * scale * perspective;
                point.projZ = z2;
                point.projScale = perspective;
            }

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            class Particle3D {
                constructor(index) {
                    this.index = index;
                    this.text = WORDS[index % WORDS.length];

                    const spanX = W / scale;
                    const spanY = H / scale;

                    this.rainX = (Math.random() - 0.5) * spanX * 1.1;
                    this.rainY = -spanY * 0.65 - Math.random() * spanY * 0.5;
                    this.rainZ = (Math.random() - 0.5) * 0.4;

                    this.speedY = Math.random() * 0.03 + 0.03;
                    this.speedX = (Math.random() - 0.5) * 0.001;

                    const theta = (index / NUM_POINTS) * Math.PI * 2 * 7;
                    const layer = (index / NUM_POINTS) * 2 - 1;
                    const hp = getHeartPoint(theta, layer);

                    this.targetX = hp.x;
                    this.targetY = hp.y;
                    this.targetZ = hp.z;

                    this.x = this.rainX;
                    this.y = this.rainY;
                    this.z = this.rainZ;

                    this.trail = [];
                    this.maxTrail = 5;

                    this.assembleDelay = Math.random() * 0.4;
                    this.fontSize = Math.random() < 0.25 ? 14 : (Math.random() < 0.7 ? 11.5 : 10);
                    this.weight = '600';
                    this.opacity = Math.random() * 0.3 + 0.7;
                    this.noiseOffset = Math.random() * 100;
                }

                update(phase, progress, rotY, rotX, beatFactor, time) {
                    const spanY = H / scale;

                    if (phase === 'rain') {
                        this.rainY += this.speedY;
                        this.rainX += this.speedX;

                        if (this.rainY > spanY * 0.6) {
                            this.rainY = -spanY * 0.65;
                            this.rainX = (Math.random() - 0.5) * (W / scale) * 1.1;
                            this.trail = [];
                        }
                        this.x = this.rainX;
                        this.y = this.rainY;
                        this.z = this.rainZ;

                    } else if (phase === 'assemble') {
                        const adjProgress = Math.max(0, Math.min(1, (progress - this.assembleDelay) / (1 - this.assembleDelay)));
                        const t = easeInOutCubic(adjProgress);

                        this.x = lerp(this.rainX, this.targetX * beatFactor, t);
                        this.y = lerp(this.rainY, this.targetY * beatFactor, t);
                        this.z = lerp(this.rainZ, this.targetZ * beatFactor, t);

                    } else if (phase === 'beating') {
                        const wave = Math.sin(time * 2.5 + this.noiseOffset) * 0.02;
                        this.x = (this.targetX + wave) * beatFactor;
                        this.y = (this.targetY + wave) * beatFactor;
                        this.z = (this.targetZ + wave) * beatFactor;
                    }

                    const currentRotY = phase === 'rain' ? 0 : rotY;
                    const currentRotX = phase === 'rain' ? 0.05 : rotX;

                    project3D(this, currentRotY, currentRotX);

                    if (phase !== 'beating') {
                        this.trail.push({ x: this.projX, y: this.projY });
                        if (this.trail.length > this.maxTrail) {
                            this.trail.shift();
                        }
                    } else {
                        this.trail = [];
                    }
                }
            }

            class Sparkle {
                constructor() {
                    this.x = CX + (Math.random() - 0.5) * 30;
                    this.y = CY + (Math.random() - 0.5) * 30 - 10;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed - Math.random() * 1.2;
                    this.size = Math.random() * 2.5 + 1;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.025 + 0.02;
                    this.isHeart = Math.random() < 0.4;

                    const colors = [
                        { r: 255, g: 45, b: 85 },
                        { r: 196, g: 71, b: 245 },
                        { r: 255, g: 107, b: 157 }
                    ];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.96;
                    this.vy *= 0.96;
                    this.vy += 0.04;
                    this.alpha -= this.decay;
                }

                draw() {
                    if (this.alpha <= 0) return;
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;

                    if (this.isHeart) {
                        const s = this.size * 2.5;
                        ctx.translate(this.x, this.y);
                        ctx.beginPath();
                        ctx.moveTo(0, s * 0.3);
                        ctx.bezierCurveTo(-s * 0.5, -s * 0.2, -s, s * 0.1, 0, s);
                        ctx.bezierCurveTo(s, s * 0.1, s * 0.5, -s * 0.2, 0, s * 0.3);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            class BackgroundStar {
                constructor() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.size = Math.random() * 1.2 + 0.3;
                    this.baseAlpha = Math.random() * 0.25 + 0.05;
                    this.speed = Math.random() * 0.02 + 0.005;
                    this.offset = Math.random() * Math.PI * 2;
                }

                draw(time) {
                    const alpha = this.baseAlpha + Math.sin(time * this.speed + this.offset) * 0.08;
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.02, alpha)})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const heartParticles = [];
            for (let i = 0; i < NUM_POINTS; i++) {
                heartParticles.push(new Particle3D(i));
            }

            const bgStars = [];
            for (let i = 0; i < 70; i++) {
                bgStars.push(new BackgroundStar());
            }

            let sparkles = [];
            let rotY = 0;
            let rotX = 0.2;

            const RAIN_DURATION = 2800;
            const ASSEMBLE_DURATION = 2200;

            let beatIntensity = 0;

            let isDragging = false;
            let startX = 0;
            let startY = 0;
            let baseRotY = 0;
            let baseRotX = 0.2;

            function handleStart(e) {
                if (!isIntroFinished) return;
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                baseRotY = rotY;
                baseRotX = rotX;
            }

            function handleMove(e) {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dx = clientX - startX;
                const dy = clientY - startY;

                rotY = baseRotY + dx * 0.007;
                rotX = Math.max(-0.6, Math.min(0.8, baseRotX + dy * 0.007));
            }

            function handleEnd(e) {
                isDragging = false;

                let clientX = startX;
                let clientY = startY;

                if (e.changedTouches && e.changedTouches.length > 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else if (e.clientX !== undefined) {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const dist = Math.hypot(clientX - startX, clientY - startY);

                if (dist < 6 && isIntroFinished) {
                    const elapsed = performance.now() - startTimestamp;
                    if (elapsed > RAIN_DURATION + ASSEMBLE_DURATION) {
                        const overlay = document.getElementById('letterOverlay');
                        if (!overlay.classList.contains('active')) {
                            openLetter();
                        }
                    }
                }
            }

            window.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            window.addEventListener('touchstart', handleStart);
            window.addEventListener('touchmove', handleMove);
            window.addEventListener('touchend', handleEnd);

            function triggerBeatExplosion() {
                const count = Math.floor(Math.random() * 5) + 8;
                for (let i = 0; i < count; i++) {
                    sparkles.push(new Sparkle());
                }
            }

            function loop(now) {
                if (!isIntroFinished) {
                    requestAnimationFrame(loop);
                    return;
                }

                const elapsed = now - startTimestamp;
                const time = now * 0.001;
                ctx.clearRect(0, 0, W, H);

                bgStars.forEach(star => star.draw(time));

                let phase = 'rain';
                let progress = 0;

                if (elapsed < RAIN_DURATION) {
                    phase = 'rain';
                    progress = elapsed / RAIN_DURATION;
                } else if (elapsed < RAIN_DURATION + ASSEMBLE_DURATION) {
                    phase = 'assemble';
                    progress = (elapsed - RAIN_DURATION) / ASSEMBLE_DURATION;
                } else {
                    phase = 'beating';
                    progress = 1.0;
                }

                let beatFactor = 1.0;
                if (phase === 'beating') {
                    const beatCycle = 1500;
                    const cycleProgress = (elapsed - (RAIN_DURATION + ASSEMBLE_DURATION)) % beatCycle;

                    if (cycleProgress < 140) {
                        const t = cycleProgress / 140;
                        beatFactor = 1.0 + Math.sin(t * Math.PI) * 0.15;
                        beatIntensity = Math.sin(t * Math.PI);
                    } else if (cycleProgress >= 260 && cycleProgress < 410) {
                        const t = (cycleProgress - 260) / 150;
                        beatFactor = 1.0 + Math.sin(t * Math.PI) * 0.11;
                        beatIntensity = Math.sin(t * Math.PI) * 0.7;
                    } else {
                        beatFactor = 1.0;
                        beatIntensity = Math.max(0, beatIntensity - 0.04);
                    }

                    const triggerTolerance = 16;
                    if (Math.abs(cycleProgress - 70) < triggerTolerance && sparkles.length < 25) {
                        triggerBeatExplosion();
                    }
                    if (Math.abs(cycleProgress - 335) < triggerTolerance && sparkles.length < 25) {
                        triggerBeatExplosion();
                    }
                }

                const glowOpacity = phase === 'beating' ? 0.03 + beatIntensity * 0.08 : 0.02;
                const radialGlow = ctx.createRadialGradient(CX, CY, 10, CX, CY, Math.max(W, H) * 0.4);
                radialGlow.addColorStop(0, `rgba(255, 45, 85, ${glowOpacity})`);
                radialGlow.addColorStop(0.5, `rgba(196, 71, 245, ${glowOpacity * 0.3})`);
                radialGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = radialGlow;
                ctx.fillRect(0, 0, W, H);

                if (phase !== 'rain' && !isDragging) {
                    rotY += ROTATION_SPEED_Y;
                    rotX = 0.25 + Math.sin(time * 0.8) * 0.1;
                }

                for (let i = 0; i < NUM_POINTS; i++) {
                    heartParticles[i].update(phase, progress, rotY, rotX, beatFactor, time);
                }

                heartParticles.sort((a, b) => a.projZ - b.projZ);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                let lastFont = '';
                let lastColor = '';

                for (let i = 0; i < NUM_POINTS; i++) {
                    const p = heartParticles[i];
                    const zNorm = (p.projZ + 0.8) / 1.6;

                    if (phase === 'beating' && zNorm > 0.55) {
                        continue;
                    }

                    if (phase !== 'beating' && p.trail.length > 1) {
                        const trailLen = p.trail.length;
                        for (let j = 0; j < trailLen - 1; j++) {
                            const trailPos = p.trail[j];
                            const trailAlpha = (p.opacity * (j / trailLen) * 0.2).toFixed(2);

                            ctx.font = `${p.weight} ${Math.max(5, Math.round(p.fontSize * 0.7 * p.projScale))}px 'Plus Jakarta Sans', sans-serif`;
                            ctx.fillStyle = `rgba(255, 45, 85, ${trailAlpha})`;
                            ctx.fillText(p.text, trailPos.x, trailPos.y);
                        }
                        lastFont = '';
                        lastColor = '';
                    }

                    const fSize = Math.max(7, Math.round(p.fontSize * p.projScale));
                    const fontStr = `${p.weight} ${fSize}px 'Plus Jakarta Sans', sans-serif`;
                    if (fontStr !== lastFont) {
                        ctx.font = fontStr;
                        lastFont = fontStr;
                    }

                    let r, g, b;
                    if (phase === 'rain') {
                        r = 255; g = 45; b = 85;
                    } else {
                        if (zNorm < 0.5) {
                            const t = zNorm * 2;
                            r = 255; g = Math.round(45 + t * 45); b = Math.round(85 + t * 45);
                        } else {
                            const t = (zNorm - 0.5) * 2;
                            r = Math.round(255 - t * 80); g = Math.round(90 - t * 40); b = Math.round(130 + t * 100);
                        }
                    }

                    let alpha = p.opacity * Math.max(0.15, (1.2 - zNorm));
                    if (phase === 'beating') {
                        if (zNorm > 0.45) {
                            alpha *= (0.55 - zNorm) / 0.1;
                        }
                    }

                    const colorStr = `rgba(${r}, ${g}, ${b}, ${alpha.toFixed(2)})`;
                    if (colorStr !== lastColor) {
                        ctx.fillStyle = colorStr;
                        lastColor = colorStr;
                    }

                    ctx.fillText(p.text, p.projX, p.projY);
                }

                sparkles = sparkles.filter(s => {
                    s.update();
                    s.draw();
                    return s.alpha > 0;
                });

                const vignetteGlow = ctx.createRadialGradient(CX, CY, Math.min(W, H) * 0.3, CX, CY, Math.max(W, H) * 0.8);
                vignetteGlow.addColorStop(0, 'rgba(2, 0, 5, 0)');
                vignetteGlow.addColorStop(1, 'rgba(2, 0, 5, 0.7)');
                ctx.fillStyle = vignetteGlow;
                ctx.fillRect(0, 0, W, H);

                if (elapsed > RAIN_DURATION + 1000) {
                    document.getElementById('msg').classList.add('active');
                }

                requestAnimationFrame(loop);
            }

            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
