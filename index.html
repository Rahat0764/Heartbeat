<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💗 My Heart Beats For You</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020005;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(2, 0, 5, 0.95) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- Start Overlay --- */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 0, 5, 0.98);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .start-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .glass-card {
            position: relative;
            width: min(85vw, 340px);
            background: rgba(22, 8, 14, 0.55);
            border: 1px solid rgba(255, 45, 85, 0.18);
            border-radius: 24px;
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 30, 80, 0.08);
        }

        .card-icon {
            font-size: 54px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 12px rgba(255, 30, 80, 0.4));
            animation: pulseIcon 2s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .card-title {
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 18px;
            text-shadow: 0 0 15px rgba(255, 45, 85, 0.3);
        }

        .loading-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #ff2d55, #9b72cf);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .status-text {
            font-size: 13px;
            color: #b5a2b0;
            font-style: italic;
            font-weight: 400;
            margin-bottom: 26px;
        }

        .start-btn {
            position: relative;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff2d55 0%, #d90429 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .start-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 45, 85, 0.5);
        }

        /* --- Letter Overlay --- */
        .letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 0, 5, 0.6);
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s;
            backdrop-filter: blur(5px);
        }

        .letter-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .letter-card {
            position: relative;
            width: min(90vw, 360px);
            background: rgba(20, 10, 25, 0.9);
            border: 1px solid rgba(255, 45, 85, 0.3);
            border-radius: 20px;
            padding: 35px 28px 30px;
            transform: translateY(40px) scale(0.95);
            opacity: 0;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 45, 85, 0.15);
        }

        .letter-overlay.active .letter-card {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        /* Elegant Exit Animation */
        .letter-overlay .letter-card.fade-out {
            transform: translateY(-60px) scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        .letter-header {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff2d55;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 45, 85, 0.15);
            padding-bottom: 8px;
        }

        .letter-body {
            font-size: 15px;
            line-height: 1.7;
            color: #fff;
            min-height: 100px;
            margin-bottom: 24px;
            white-space: pre-line;
            font-weight: 400;
        }

        .letter-sign {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            color: #ff6b9d;
            text-align: right;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .letter-sign.visible {
            opacity: 1;
        }

        /* --- Curtain & Restart Screen --- */
        .curtain-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 300;
            pointer-events: none;
            display: flex;
        }

        .curtain {
            width: 50%;
            height: 100%;
            background: #000;
            transition: transform 1.2s cubic-bezier(0.64, 0, 0.78, 0);
        }

        .curtain.left { transform: translateX(-100%); border-right: 1px solid rgba(255, 45, 85, 0.3); }
        .curtain.right { transform: translateX(100%); border-left: 1px solid rgba(255, 45, 85, 0.3); }

        .curtain-container.active .curtain { transform: translateX(0); }
        .curtain-container.active { pointer-events: auto; cursor: pointer; }

        .restart-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease 0.6s;
            z-index: 310;
        }

        .curtain-container.active .restart-content {
            opacity: 1;
            visibility: visible;
        }

        .restart-content h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 58px;
            color: #ff2d55;
            margin-bottom: 10px;
            text-shadow: 0 0 25px rgba(255, 45, 85, 0.5);
        }

        .restart-content p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    
    <audio id="bgMusic" src="song.mp3" loop></audio>

    <div class="start-overlay" id="startOverlay">
        <div class="glass-card">
            <div class="card-icon">💓</div>
            <h2 class="card-title">For My Love</h2>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <p class="status-text" id="statusText">Waiting for your touch...</p>
            <button class="start-btn" id="startBtn" disabled>
                <span class="btn-text">Feel My Heartbeat</span>
            </button>
        </div>
    </div>

    <canvas id="c"></canvas>
    <div class="vignette"></div>

    <!-- Letter Overlay -->
    <div class="letter-overlay" id="letterOverlay">
        <div class="letter-card" id="letterCard">
            <div class="letter-header">for you</div>
            <div class="letter-body" id="letterBody"></div>
            <div class="letter-sign" id="letterSign">Yours forever, Rahat</div>
        </div>
    </div>

    <!-- Curtains & Reload -->
    <div class="curtain-container" id="curtainContainer" onclick="location.reload()">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
        <div class="restart-content" id="restartContent">
            <h2>I Love You</h2>
            <p>tap here to reload</p>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');

            let W = window.innerWidth;
            let H = window.innerHeight;
            let CX = W / 2;
            let CY = H / 2;
            let dpr = Math.min(window.devicePixelRatio || 1, 2);
            let scale = Math.min(W, H) * 0.22;

            // Load Custom Image
            const myPhoto = new Image();
            myPhoto.src = 'photo.jpg';

            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                CX = W / 2;
                CY = H / 2;
                scale = Math.min(W, H) * 0.22;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.scale(dpr, dpr);
            }
            window.addEventListener('resize', resize);
            resize();

            const NUM_POINTS = 200; // Increased for denser heart
            let currentRotSpeed = 0.006; 
            
            // Solid, clear font family for particles
            const FONT_FAMILY = "'Plus Jakarta Sans', sans-serif";

            // Simple, beautiful words
            const WORDS = [
                'kitty', 'lamu', 'kolija', '❤', 'love', 'boujaan', 
                'forever', 'always', 'you', 'me', 'love you', 'sweetheart'
            ];

            let startTimestamp = null;
            let isIntroFinished = false;
            
            // Sequence Flags
            let isLetterTriggered = false;
            let isDramaticSpin = false;
            let isPhotoRevealing = false;
            
            // Image Animation Variables
            let imgAlpha = 0;
            let innerHeartScale = 0.5;

            // Loader
            function startCardLoader() {
                const loadingBar = document.getElementById('loadingBar');
                const statusText = document.getElementById('statusText');
                const startBtn = document.getElementById('startBtn');
                const duration = 2000;
                const steps = [
                    { threshold: 30, text: 'Thinking about your smile...' },
                    { threshold: 60, text: 'Gathering all my love...' },
                    { threshold: 100, text: 'Ready 💗' }
                ];
                let loaderStart = null;
                function animateLoader(timestamp) {
                    if (!loaderStart) loaderStart = timestamp;
                    const progress = Math.min((timestamp - loaderStart) / duration, 1);
                    const percent = Math.floor(progress * 100);
                    loadingBar.style.width = `${percent}%`;
                    const activeStep = steps.find(s => percent <= s.threshold) || steps[steps.length - 1];
                    statusText.textContent = activeStep.text;

                    if (progress < 1) requestAnimationFrame(animateLoader);
                    else startBtn.removeAttribute('disabled');
                }
                requestAnimationFrame(animateLoader);
            }
            setTimeout(startCardLoader, 300);

            // Start Button
            document.getElementById('startBtn').addEventListener('click', () => {
                const bgMusic = document.getElementById('bgMusic');
                bgMusic.play().catch(e => console.log(e));
                document.getElementById('startOverlay').classList.add('fade-out');
                setTimeout(() => {
                    startTimestamp = performance.now();
                    isIntroFinished = true;
                }, 600);
            });

            // Letter Logic
            const letterText = "Dear Boujaan,\n\nI made this just for you...\n\nEvery single word you see here is a reminder of how much you mean to me, and how deeply I have fallen for you.\n\nNo matter where life takes us, my heart will always beat only for you, today and forever 💗.";

            function startLetterSequence() {
                isLetterTriggered = true;
                const overlay = document.getElementById('letterOverlay');
                overlay.classList.add('active');
                const body = document.getElementById('letterBody');
                body.innerHTML = '';

                let charIdx = 0;
                function typeChar() {
                    if (charIdx < letterText.length) {
                        const char = letterText[charIdx];
                        if (char === '\n') body.innerHTML += '<br>';
                        else body.innerHTML += char;
                        charIdx++;
                        setTimeout(typeChar, 45);
                    } else {
                        document.getElementById('letterSign').classList.add('visible');
                        // Give 3.5 seconds to read
                        setTimeout(endLetterSequence, 3500);
                    }
                }
                setTimeout(typeChar, 600);
            }

            function endLetterSequence() {
                const card = document.getElementById('letterCard');
                card.classList.add('fade-out'); // Moves up and fades beautifully
                
                setTimeout(() => {
                    document.getElementById('letterOverlay').classList.remove('active');
                    initiatePhotoSequence();
                }, 1000); 
            }

            function initiatePhotoSequence() {
                // Step 1: Dramatic Spin & slight expansion
                isDramaticSpin = true;
                currentRotSpeed = 0.04; 

                // Step 2: Fade in Photo INSIDE the heart
                setTimeout(() => {
                    isPhotoRevealing = true;
                    currentRotSpeed = 0.015; // Slow down a bit so photo is visible clearly
                    
                    // Step 3: Wait 2.5 seconds, then close curtain
                    setTimeout(() => {
                        document.getElementById('curtainContainer').classList.add('active');
                    }, 2500);

                }, 1000);
            }

            // 3D Math for Heart
            function getHeartPoint(t, layer) {
                const x = Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 16;
                const r = Math.sqrt(1 - layer * layer);
                const depthScale = 0.45 + 0.55 * r;
                return {
                    x: x * depthScale * 1.5,
                    y: (y * depthScale - 0.08) * 1.5,
                    z: layer * 0.7
                };
            }

            function project3D(point, rotY, rotX) {
                const cosY = Math.cos(rotY);
                const sinY = Math.sin(rotY);
                const x1 = point.x * cosY - point.z * sinY;
                const z1 = point.x * sinY + point.z * cosY;

                const cosX = Math.cos(rotX);
                const sinX = Math.sin(rotX);
                const y2 = point.y * cosX - z1 * sinX;
                const z2 = point.y * sinX + z1 * cosX;

                const dist = 3.5;
                const perspective = dist / (dist + z2);

                point.projX = CX + x1 * scale * perspective;
                point.projY = CY + y2 * scale * perspective;
                point.projZ = z2; // For sorting
                point.projScale = perspective;
            }

            function lerp(a, b, t) { return a + (b - a) * t; }
            function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

            class Particle3D {
                constructor(index) {
                    this.index = index;
                    this.text = WORDS[index % WORDS.length];

                    const spanX = W / scale;
                    const spanY = H / scale;

                    // BEAUTIFUL RAIN: Distribute particles across entire screen instantly
                    this.rainX = (Math.random() - 0.5) * spanX * 2.2;
                    this.rainY = (Math.random() - 1.2) * spanY * 1.5; 
                    this.rainZ = (Math.random() - 0.5) * 1.5;

                    this.speedY = Math.random() * 0.02 + 0.015;
                    this.driftOffset = Math.random() * Math.PI * 2;
                    this.driftSpeed = Math.random() * 1.0 + 0.5;

                    const theta = (index / NUM_POINTS) * Math.PI * 2 * 11;
                    const layer = (index / NUM_POINTS) * 2 - 1;
                    const hp = getHeartPoint(theta, layer);

                    this.targetX = hp.x;
                    this.targetY = hp.y;
                    this.targetZ = hp.z;

                    this.x = this.rainX;
                    this.y = this.rainY;
                    this.z = this.rainZ;

                    this.trail = [];
                    this.maxTrail = 5;

                    this.assembleDelay = Math.random() * 0.6;
                    // Slightly larger font size for normal text clarity
                    this.fontSize = Math.random() < 0.3 ? 16 : (Math.random() < 0.7 ? 13 : 11);
                    this.weight = '600';
                    this.opacity = Math.random() * 0.4 + 0.6; // Very visible
                    this.noiseOffset = Math.random() * 100;
                }

                update(phase, progress, rotY, rotX, beatFactor, time) {
                    const spanY = H / scale;

                    if (phase === 'rain') {
                        this.rainY += this.speedY;
                        const sway = Math.sin(time * this.driftSpeed + this.driftOffset) * 0.01;
                        this.rainX += sway;

                        if (this.rainY > spanY * 0.8) {
                            this.rainY = -spanY * 0.8;
                            this.rainX = (Math.random() - 0.5) * spanX * 2.2;
                        }
                        this.x = this.rainX;
                        this.y = this.rainY;
                        this.z = this.rainZ;

                    } else if (phase === 'assemble') {
                        const adjProgress = Math.max(0, Math.min(1, (progress - this.assembleDelay) / (1 - this.assembleDelay)));
                        const t = easeInOutCubic(adjProgress);

                        this.x = lerp(this.rainX, this.targetX * beatFactor, t);
                        this.y = lerp(this.rainY, this.targetY * beatFactor, t);
                        this.z = lerp(this.rainZ, this.targetZ * beatFactor, t);
                    } else if (phase === 'beating') {
                        const wave = Math.sin(time * 1.5 + this.noiseOffset) * 0.01;
                        this.x = (this.targetX + wave) * beatFactor;
                        this.y = (this.targetY + wave) * beatFactor;
                        this.z = (this.targetZ + wave) * beatFactor;
                    }

                    project3D(this, rotY, rotX);

                    if (phase !== 'beating' && !isPhotoRevealing) {
                        this.trail.push({ x: this.projX, y: this.projY });
                        if (this.trail.length > this.maxTrail) this.trail.shift();
                    } else {
                        this.trail = [];
                    }
                }
            }

            const heartParticles = [];
            for (let i = 0; i < NUM_POINTS; i++) {
                heartParticles.push(new Particle3D(i));
            }

            let rotY = 0;
            let rotX = 0.2;

            // Phase Timings
            const RAIN_DURATION = 4000; 
            const ASSEMBLE_DURATION = 3000;
            const BEAT_BEFORE_LETTER = 3000; 

            // Function to clip a perfect heart shape on canvas
            function createHeartPath(context, customScale) {
                context.beginPath();
                for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                    const x = Math.pow(Math.sin(t), 3) * 1.5;
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 16 * 1.5 - 0.08;
                    const px = x * customScale;
                    const py = y * customScale;
                    if (t === 0) context.moveTo(px, py);
                    else context.lineTo(px, py);
                }
                context.closePath();
            }

            // Function to draw image imitating "object-fit: cover"
            function drawImageCover(ctx, img, w, h) {
                const imgRatio = img.width / img.height;
                const targetRatio = w / h;
                let drawW, drawH;
                if (imgRatio > targetRatio) {
                    drawH = h; drawW = h * imgRatio;
                } else {
                    drawW = w; drawH = w / imgRatio;
                }
                ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
            }

            function renderParticles(particles, phase) {
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const zNorm = (p.projZ + 0.8) / 1.6;

                    if (phase === 'beating' && zNorm > 0.6 && !isDramaticSpin) continue;

                    // Trails during rain
                    if (phase !== 'beating' && p.trail.length > 1 && !isPhotoRevealing) {
                        for (let j = 0; j < p.trail.length - 1; j++) {
                            const trailPos = p.trail[j];
                            const trailAlpha = (p.opacity * (j / p.trail.length) * 0.35).toFixed(2);
                            ctx.font = `${p.weight} ${Math.max(6, Math.round(p.fontSize * 0.7 * p.projScale))}px ${FONT_FAMILY}`;
                            ctx.fillStyle = phase === 'rain' ? `rgba(255, 120, 160, ${trailAlpha})` : `rgba(255, 45, 85, ${trailAlpha})`;
                            ctx.fillText(p.text, trailPos.x, trailPos.y);
                        }
                    }

                    const fSize = Math.max(8, Math.round(p.fontSize * p.projScale));
                    ctx.font = `${p.weight} ${fSize}px ${FONT_FAMILY}`;

                    let r = 255, g = 45, b = 85;
                    if (phase === 'rain') {
                        g = 130; b = 170; // Soft pink/white
                    } else {
                        if (zNorm < 0.5) {
                            const t = zNorm * 2;
                            g = Math.round(45 + t * 45); b = Math.round(85 + t * 45);
                        } else {
                            const t = (zNorm - 0.5) * 2;
                            r = Math.round(255 - t * 80); g = Math.round(90 - t * 40); b = Math.round(130 + t * 100);
                        }
                    }

                    let alpha = p.opacity * Math.max(0.3, (1.2 - zNorm));
                    if (phase === 'beating' && zNorm > 0.45 && !isDramaticSpin) alpha *= (0.55 - zNorm) / 0.1;
                    
                    // Slightly fade text when photo is revealing so photo pops out
                    if (isPhotoRevealing) alpha *= 0.7;

                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha.toFixed(2)})`;
                    ctx.fillText(p.text, p.projX, p.projY);
                }
            }

            function loop(now) {
                if (!isIntroFinished) {
                    requestAnimationFrame(loop);
                    return;
                }

                const elapsed = now - startTimestamp;
                const time = now * 0.001;
                ctx.clearRect(0, 0, W, H);

                let phase = 'rain';
                let progress = 0;

                if (elapsed < RAIN_DURATION) {
                    phase = 'rain';
                    progress = elapsed / RAIN_DURATION;
                } else if (elapsed < RAIN_DURATION + ASSEMBLE_DURATION) {
                    phase = 'assemble';
                    progress = (elapsed - RAIN_DURATION) / ASSEMBLE_DURATION;
                } else {
                    phase = 'beating';
                    progress = 1.0;

                    if (!isLetterTriggered && elapsed > (RAIN_DURATION + ASSEMBLE_DURATION + BEAT_BEFORE_LETTER)) {
                        startLetterSequence();
                    }
                }

                let beatFactor = 1.0;
                if (phase === 'beating' && !isDramaticSpin && !isPhotoRevealing) {
                    const beatCycle = 1800; 
                    const cycleProgress = (elapsed - (RAIN_DURATION + ASSEMBLE_DURATION)) % beatCycle;
                    if (cycleProgress < 150) {
                        beatFactor = 1.0 + Math.sin((cycleProgress / 150) * Math.PI) * 0.1;
                    } else if (cycleProgress >= 280 && cycleProgress < 430) {
                        beatFactor = 1.0 + Math.sin(((cycleProgress - 280) / 150) * Math.PI) * 0.06;
                    }
                } else if (isDramaticSpin) {
                    beatFactor = 1.15; // Heart expands slightly when spinning fast
                }

                rotY += currentRotSpeed; 
                if(!isDramaticSpin) rotX = 0.25 + Math.sin(time * 0.5) * 0.08; 

                for (let i = 0; i < NUM_POINTS; i++) {
                    heartParticles[i].update(phase, progress, rotY, rotX, beatFactor, time);
                }

                // Sort particles back-to-front (Z > 0 is farther away)
                heartParticles.sort((a, b) => b.projZ - a.projZ);
                
                // Split particles to draw image in the middle
                const backParticles = heartParticles.filter(p => p.projZ > 0);
                const frontParticles = heartParticles.filter(p => p.projZ <= 0);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // 1. Draw back words
                renderParticles(backParticles, phase);

                // 2. Draw Image Inside Heart (If revealing)
                if (isPhotoRevealing && myPhoto.complete && myPhoto.naturalWidth > 0) {
                    imgAlpha = Math.min(1.0, imgAlpha + 0.02); // Smooth fade in
                    innerHeartScale = lerp(innerHeartScale, 0.95, 0.05); // Smooth pop up

                    ctx.save();
                    ctx.translate(CX, CY);
                    
                    // Create perfect heart mask matching the 3D shape
                    createHeartPath(ctx, scale * beatFactor * innerHeartScale);
                    ctx.clip();
                    
                    ctx.globalAlpha = imgAlpha;
                    const boxSize = scale * 3.5; // Ensure it covers the mask
                    drawImageCover(ctx, myPhoto, boxSize, boxSize);
                    
                    // Inner shadow for depth
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 30;
                    ctx.strokeStyle = 'rgba(255, 45, 85, 0.5)';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    ctx.restore();
                }

                // 3. Draw front words (They will fly OVER the photo!)
                renderParticles(frontParticles, phase);

                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
